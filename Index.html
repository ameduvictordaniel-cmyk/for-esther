<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Special Question 💍</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#fad0c4);
    overflow:hidden;
}

.card{
    width:360px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    text-align:center;
}

.avatar{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#ff4d6d;
    color:#fff;
    font-size:35px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
}

h2{
    margin-top:18px;
    color:#333;
}

p{
    margin-top:12px;
    color:#666;
    font-size:18px;
}

.buttons{
    margin-top:35px;
    display:flex;
    justify-content:space-between;
    position:relative;
    height:60px;
}

button{
    width:130px;
    height:50px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

#yes{
    background:#28a745;
    color:white;
}

#no{
    background:#dc3545;
    color:white;
    position:absolute;
    right:0;
}
</style>
</head>

<body>

<div class="card">

<div class="avatar">💍</div>

<h2>Heyyy ❤️, Esther</h2>
<h2>I have something very important to ask you...</h2>

<p>💍 Would you please marry me?</p>

<div class="buttons">
<button id="yes">Yes ❤️</button>
<button id="no">No 💔</button>
</div>

</div>

<script>

const noBtn=document.getElementById("no");

function moveButton(){

const maxX=window.innerWidth-noBtn.offsetWidth;
const maxY=window.innerHeight-noBtn.offsetHeight;

const x=Math.random()*maxX;
const y=Math.random()*maxY;

noBtn.style.position="fixed";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("click",moveButton);

document.getElementById("yes").onclick=function(){

document.body.innerHTML=`<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial,Helvetica,sans-serif;
text-align:center;
color:white;
padding:20px;
">

<div>

<h1 style="font-size:48px;">💍 She Said YES! ❤️</h1>

<h2 style="margin-top:20px;">
Esther, thank you for accepting to marry me! 🥹💖
</h2>

<p style="margin-top:20px;font-size:22px;line-height:1.6;">
You just made this the happiest day of my life. 💕<br><br>
I promise to love you, cherish you, and stand by your side through every season of life. 💍❤️<br><br>
I can't wait to spend forever with you. ✨
</p>

</div>

</div>
`;

}

</script>

</body>
</html>
